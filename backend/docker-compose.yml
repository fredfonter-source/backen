services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ott
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ott_db:/var/lib/postgresql/data

  api:
    build: .
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ott?schema=public
      JWT_SECRET: replace_me_with_strong_random_secret_32_chars_minimum
      CORS_ORIGIN: "*"
      UPLOAD_DIR: uploads
      PUBLIC_BASE_URL: http://YOUR_VPS_DOMAIN_OR_IP:8080
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  ott_db:

